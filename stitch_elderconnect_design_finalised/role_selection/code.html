<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ElderConnect - Role Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Lexend:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed": "#a0f0f0",
                    "surface-container-highest": "#e3e2e3",
                    "on-error-container": "#93000a",
                    "primary-container": "#006a6a",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#93ccff",
                    "secondary-fixed-dim": "#ffb778",
                    "tertiary-container": "#0e6496",
                    "on-tertiary-container": "#bbddff",
                    "on-surface-variant": "#3e4948",
                    "on-primary-fixed-variant": "#004f4f",
                    "on-background": "#1a1c1d",
                    "on-secondary-container": "#6f3c00",
                    "on-primary-container": "#97e7e6",
                    "secondary": "#8e4e00",
                    "on-secondary-fixed": "#2e1500",
                    "inverse-primary": "#84d4d3",
                    "surface-container-low": "#f4f3f4",
                    "surface-container": "#eeeeee",
                    "on-primary-fixed": "#002020",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-primary": "#ffffff",
                    "primary": "#005050",
                    "surface-bright": "#faf9fa",
                    "surface": "#faf9fa",
                    "surface-dim": "#dadadb",
                    "surface-tint": "#006a6a",
                    "surface-variant": "#e3e2e3",
                    "surface-container-high": "#e8e8e9",
                    "on-secondary-fixed-variant": "#6c3a00",
                    "tertiary": "#004b74",
                    "on-tertiary-fixed-variant": "#004b73",
                    "error": "#ba1a1a",
                    "inverse-on-surface": "#f1f0f1",
                    "secondary-fixed": "#ffdcc1",
                    "outline": "#6e7979",
                    "error-container": "#ffdad6",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed": "#cce5ff",
                    "on-tertiary-fixed": "#001d31",
                    "inverse-surface": "#2f3131",
                    "secondary-container": "#fda54f",
                    "background": "#faf9fa",
                    "on-surface": "#1a1c1d",
                    "primary-fixed-dim": "#84d4d3",
                    "outline-variant": "#bec9c8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Lexend"],
                    "label": ["Lexend"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Lexend', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .bg-gradient-soft {
            background: linear-gradient(135deg, #005050 0%, #006a6a 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Content Area: Center Focused for Role Selection -->
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12 max-w-2xl mx-auto w-full">
<!-- Branding Moment -->
<div class="mb-12 text-center">
<span class="text-primary font-bold tracking-widest uppercase text-xs mb-4 block">ElderConnect</span>
<h1 class="text-5xl md:text-6xl font-extrabold text-on-background tracking-tight leading-tight">
                Welcome! Who are you?
            </h1>
<p class="text-on-surface-variant text-lg mt-6 font-light max-w-md mx-auto">
                Select your profile to personalize your experience and connect with your circle.
            </p>
</div>
<!-- Role Options: Vertically Stacked High-Contrast Cards -->
<div class="w-full space-y-6">
<!-- Elder Role Card -->
<button class="group w-full text-left bg-surface-container-lowest p-8 rounded-[2.5rem] flex items-center justify-between transition-all duration-300 hover:bg-primary hover:shadow-2xl hover:shadow-primary/20 active:scale-[0.98] focus:outline-none focus:ring-4 focus:ring-primary/30">
<div class="flex items-center space-x-8">
<!-- Icon Container -->
<div class="w-24 h-24 rounded-full bg-primary-fixed flex items-center justify-center group-hover:bg-white/20 transition-colors duration-300">
<span class="material-symbols-outlined text-5xl text-primary group-hover:text-white" data-icon="person_celebrate" style="font-variation-settings: 'FILL' 1;">person_celebrate</span>
</div>
<!-- Label -->
<div>
<h2 class="text-3xl font-bold text-primary group-hover:text-white transition-colors duration-300">I am an Elder</h2>
<p class="text-on-surface-variant group-hover:text-primary-fixed text-lg mt-1 transition-colors duration-300">Browse your activities and links.</p>
</div>
</div>
<div class="hidden sm:block">
<span class="material-symbols-outlined text-4xl text-outline-variant group-hover:text-white transition-colors duration-300" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<!-- Caretaker Role Card -->
<button class="group w-full text-left bg-secondary-container/10 p-8 rounded-[2.5rem] flex items-center justify-between transition-all duration-300 hover:bg-secondary hover:shadow-2xl hover:shadow-secondary/20 active:scale-[0.98] focus:outline-none focus:ring-4 focus:ring-secondary/30">
<div class="flex items-center space-x-8">
<!-- Icon Container -->
<div class="w-24 h-24 rounded-full bg-secondary-fixed flex items-center justify-center group-hover:bg-white/20 transition-colors duration-300">
<span class="material-symbols-outlined text-5xl text-secondary group-hover:text-white" data-icon="volunteer_activism" style="font-variation-settings: 'FILL' 1;">volunteer_activism</span>
</div>
<!-- Label -->
<div>
<h2 class="text-3xl font-bold text-secondary group-hover:text-white transition-colors duration-300">I am a Caretaker</h2>
<p class="text-on-surface-variant group-hover:text-secondary-fixed text-lg mt-1 transition-colors duration-300">Support and stay connected.</p>
</div>
</div>
<div class="hidden sm:block">
<span class="material-symbols-outlined text-4xl text-outline-variant group-hover:text-white transition-colors duration-300" data-icon="chevron_right">chevron_right</span>
</div>
</button>
</div>
<!-- Footer Decoration / Secondary Link -->
<div class="mt-16 text-center space-y-8">
<div class="flex items-center justify-center gap-4 text-on-surface-variant/40">
<div class="h-[1px] w-12 bg-current"></div>
<span class="material-symbols-outlined text-sm" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
<div class="h-[1px] w-12 bg-current"></div>
</div>
<a class="inline-flex items-center text-primary font-semibold text-lg hover:underline decoration-2 underline-offset-8" href="#">
                Learn more about our community
                <span class="material-symbols-outlined ml-2 text-xl" data-icon="arrow_forward">arrow_forward</span>
</a>
</div>
</main>
<!-- Background Decoration (Soft, Non-distracting tonal shifts) -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/3 bg-primary-fixed/20 blur-[120px] rounded-full"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/4 h-1/4 bg-secondary-fixed/20 blur-[100px] rounded-full"></div>
</body></html>

<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ElderConnect Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Lexend:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#006a6a",
                        "surface-bright": "#faf9fa",
                        "on-surface": "#1a1c1d",
                        "on-error-container": "#93000a",
                        "primary-container": "#006a6a",
                        "surface-container": "#eeeeee",
                        "surface": "#faf9fa",
                        "secondary-fixed-dim": "#ffb778",
                        "on-surface-variant": "#3e4948",
                        "tertiary-fixed-dim": "#93ccff",
                        "primary-fixed-dim": "#84d4d3",
                        "on-tertiary-fixed-variant": "#004b73",
                        "on-primary-fixed": "#002020",
                        "inverse-on-surface": "#f1f0f1",
                        "on-primary-fixed-variant": "#004f4f",
                        "tertiary": "#004b74",
                        "surface-container-low": "#f4f3f4",
                        "on-secondary-fixed-variant": "#6c3a00",
                        "on-primary-container": "#97e7e6",
                        "on-tertiary-container": "#bbddff",
                        "on-secondary-container": "#6f3c00",
                        "outline": "#6e7979",
                        "surface-dim": "#dadadb",
                        "surface-container-high": "#e8e8e9",
                        "secondary-fixed": "#ffdcc1",
                        "secondary-container": "#fda54f",
                        "primary": "#005050",
                        "inverse-primary": "#84d4d3",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#2e1500",
                        "surface-container-highest": "#e3e2e3",
                        "on-tertiary-fixed": "#001d31",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#cce5ff",
                        "outline-variant": "#bec9c8",
                        "error": "#ba1a1a",
                        "background": "#faf9fa",
                        "on-background": "#1a1c1d",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e3e2e3",
                        "secondary": "#8e4e00",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#0e6496",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "primary-fixed": "#a0f0f0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Lexend"],
                        "label": ["Lexend"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .pin-dot {
            width: 24px;
            height: 24px;
            transition: all 0.3s ease;
        }
        .numpad-btn {
            min-width: 84px;
            min-height: 84px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
<div class="min-h-screen flex flex-col items-center justify-between py-12 px-6 max-w-lg mx-auto overflow-hidden">
<!-- Header Section -->
<header class="w-full flex flex-col items-center text-center space-y-8 mt-4">
<div class="flex flex-col items-center space-y-4">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<h1 class="font-headline font-extrabold text-teal-900 dark:text-teal-100 uppercase tracking-widest text-lg">ElderConnect</h1>
</div>
<div class="space-y-3">
<h2 class="font-headline font-bold text-4xl text-primary tracking-tight">Welcome back!</h2>
<p class="font-body text-outline font-light text-xl">Enter your PIN to continue.</p>
</div>
</header>
<!-- PIN Indicator Section -->
<main class="w-full flex flex-col items-center flex-grow justify-center py-10">
<div class="flex gap-8 mb-12">
<!-- Active dot -->
<div class="pin-dot rounded-full bg-primary ring-8 ring-primary/10"></div>
<!-- Inactive dots -->
<div class="pin-dot rounded-full bg-surface-container-highest"></div>
<div class="pin-dot rounded-full bg-surface-container-highest"></div>
<div class="pin-dot rounded-full bg-surface-container-highest"></div>
</div>
<!-- Number Pad -->
<div class="grid grid-cols-3 gap-6 w-full max-w-xs">
<!-- Row 1 -->
<button class="numpad-btn flex items-center justify-center bg-surface-container-lowest text-3xl font-headline font-semibold text-primary rounded-xl shadow-sm hover:bg-primary/5 active:scale-95 transition-all">1</button>
<button class="numpad-btn flex items-center justify-center bg-surface-container-lowest text-3xl font-headline font-semibold text-primary rounded-xl shadow-sm hover:bg-primary/5 active:scale-95 transition-all">2</button>
<button class="numpad-btn flex items-center justify-center bg-surface-container-lowest text-3xl font-headline font-semibold text-primary rounded-xl shadow-sm hover:bg-primary/5 active:scale-95 transition-all">3</button>
<!-- Row 2 -->
<button class="numpad-btn flex items-center justify-center bg-surface-container-lowest text-3xl font-headline font-semibold text-primary rounded-xl shadow-sm hover:bg-primary/5 active:scale-95 transition-all">4</button>
<button class="numpad-btn flex items-center justify-center bg-surface-container-lowest text-3xl font-headline font-semibold text-primary rounded-xl shadow-sm hover:bg-primary/5 active:scale-95 transition-all">5</button>
<button class="numpad-btn flex items-center justify-center bg-surface-container-lowest text-3xl font-headline font-semibold text-primary rounded-xl shadow-sm hover:bg-primary/5 active:scale-95 transition-all">6</button>
<!-- Row 3 -->
<button class="numpad-btn flex items-center justify-center bg-surface-container-lowest text-3xl font-headline font-semibold text-primary rounded-xl shadow-sm hover:bg-primary/5 active:scale-95 transition-all">7</button>
<button class="numpad-btn flex items-center justify-center bg-surface-container-lowest text-3xl font-headline font-semibold text-primary rounded-xl shadow-sm hover:bg-primary/5 active:scale-95 transition-all">8</button>
<button class="numpad-btn flex items-center justify-center bg-surface-container-lowest text-3xl font-headline font-semibold text-primary rounded-xl shadow-sm hover:bg-primary/5 active:scale-95 transition-all">9</button>
<!-- Row 4 -->
<button class="numpad-btn flex items-center justify-center bg-surface-container-low text-outline rounded-xl hover:bg-error-container hover:text-error active:scale-95 transition-all">
<span class="material-symbols-outlined text-3xl" data-icon="backspace">backspace</span>
</button>
<button class="numpad-btn flex items-center justify-center bg-surface-container-lowest text-3xl font-headline font-semibold text-primary rounded-xl shadow-sm hover:bg-primary/5 active:scale-95 transition-all">0</button>
<button class="numpad-btn flex items-center justify-center bg-secondary-container text-on-secondary-container rounded-xl shadow-md hover:bg-secondary active:scale-95 transition-all">
<span class="material-symbols-outlined text-4xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</div>
</main>
<!-- Footer Help Section -->
<footer class="w-full flex flex-col items-center pt-8">
<button class="group flex items-center gap-3 px-8 py-4 rounded-full hover:bg-surface-container-low transition-all">
<div class="w-10 h-10 bg-secondary/10 rounded-full flex items-center justify-center group-hover:bg-secondary/20 transition-colors">
<span class="material-symbols-outlined text-secondary text-2xl" data-icon="support_agent">support_agent</span>
</div>
<span class="font-body font-medium text-secondary text-lg">Need help? Request your caretaker.</span>
</button>
<div class="mt-8 flex gap-4">
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
</footer>
</div>
<!-- Background Decoration for Editorial feel -->
<div class="fixed top-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[120px] -z-10"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-secondary/5 blur-[120px] -z-10"></div>
</body></html>

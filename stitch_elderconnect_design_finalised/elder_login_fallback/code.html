<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ElderConnect - Login</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-bright": "#faf9fa",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#cce5ff",
                        "background": "#faf9fa",
                        "on-surface-variant": "#3e4948",
                        "surface-variant": "#e3e2e3",
                        "on-surface": "#1a1c1d",
                        "primary": "#005050",
                        "on-tertiary-fixed-variant": "#004b73",
                        "on-tertiary-container": "#bbddff",
                        "inverse-surface": "#2f3131",
                        "on-secondary-fixed": "#2e1500",
                        "tertiary-fixed-dim": "#93ccff",
                        "surface-container-high": "#e8e8e9",
                        "on-secondary-container": "#6f3c00",
                        "on-primary-fixed": "#002020",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#97e7e6",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#004f4f",
                        "secondary-container": "#fda54f",
                        "secondary-fixed-dim": "#ffb778",
                        "on-tertiary": "#ffffff",
                        "primary-fixed-dim": "#84d4d3",
                        "surface-container": "#eeeeee",
                        "surface-container-highest": "#e3e2e3",
                        "primary-fixed": "#a0f0f0",
                        "surface-dim": "#dadadb",
                        "on-secondary-fixed-variant": "#6c3a00",
                        "tertiary-container": "#0e6496",
                        "primary-container": "#006a6a",
                        "tertiary": "#004b74",
                        "outline": "#6e7979",
                        "outline-variant": "#bec9c8",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#f1f0f1",
                        "surface-tint": "#006a6a",
                        "error": "#ba1a1a",
                        "on-background": "#1a1c1d",
                        "secondary": "#8e4e00",
                        "surface-container-low": "#f4f3f4",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed": "#001d31",
                        "on-primary": "#ffffff",
                        "surface": "#faf9fa",
                        "secondary-fixed": "#ffdcc1",
                        "inverse-primary": "#84d4d3"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Lexend", "sans-serif"],
                        "label": ["Lexend", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-fixed selection:text-on-primary-fixed">
<main class="w-full max-w-md flex flex-col items-center">
<!-- Logo & Brand -->
<div class="flex flex-col items-center gap-4 mb-12">
<div class="w-24 h-24 rounded-[9999px] bg-surface-container-low flex items-center justify-center text-primary shadow-[0_8px_32px_rgba(26,28,29,0.06)]">
<span class="material-symbols-outlined text-[3rem]" data-icon="volunteer_activism" style="font-variation-settings: 'FILL' 1;">volunteer_activism</span>
</div>
<h1 class="font-headline text-2xl font-bold text-primary tracking-tight">ElderConnect</h1>
</div>
<!-- Headings -->
<div class="text-center mb-12 w-full px-4">
<h2 class="font-headline text-[2.5rem] leading-tight font-bold text-on-surface mb-4">Welcome Back</h2>
<p class="font-body text-lg text-on-surface-variant leading-[1.6]">Ask your caretaker for help if needed</p>
</div>
<!-- Form Area -->
<div class="w-full flex flex-col gap-8">
<!-- Phone Input -->
<label class="flex flex-col gap-3 group">
<span class="font-label text-lg font-medium text-on-surface-variant px-2">Phone Number</span>
<div class="relative overflow-hidden rounded-xl bg-surface-container-highest transition-colors focus-within:bg-surface-container-low">
<input class="w-full h-[72px] bg-transparent border-0 text-on-surface font-body text-xl px-6 focus:ring-0 placeholder:text-outline-variant peer" placeholder="Enter your number" type="tel"/>
<!-- Active State Bottom Bar -->
<div class="absolute bottom-0 left-0 right-0 h-1 bg-primary scale-x-0 peer-focus:scale-x-100 transition-transform duration-300 origin-center"></div>
</div>
</label>
<!-- Primary CTA -->
<button class="w-full h-[72px] mt-4 rounded-[9999px] bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline text-2xl font-bold shadow-[0_8px_32px_rgba(26,28,29,0.06)] hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-3 group">
                Sign In
                <span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Helper Text -->
<div class="text-center mt-6 px-4">
<p class="font-body text-base text-outline leading-[1.6]">
                    Having trouble? Ask your caretaker to help you sign in.
                </p>
</div>
</div>
</main>
</body></html>

<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ElderConnect - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Lexend:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
      tailwind.config = {

                "on-primary-fixed-variant": "#004f4f",
                "secondary-fixed": "#ffdcc1",

                "tertiary-fixed": "#cce5ff",
                "on-background": "#1a1c1d",
                "on-secondary-fixed": "#2e1500",
                "inverse-on-surface": "#f1f0f1",
                "surface-tint": "#006a6a",
                "primary": "#005050",
                "on-primary-fixed": "#002020",
                "on-surface-variant": "#3e4948",
                "primary-fixed-dim": "#84d4d3",
                "error": "#ba1a1a",
                "surface-dim": "#dadadb",
                "background": "#faf9fa",
                "secondary-fixed-dim": "#ffb778",
                "on-primary": "#ffffff",
                "error-container": "#ffdad6",
                "on-tertiary": "#ffffff",
                "surface-bright": "#faf9fa",
                "on-primary-container": "#97e7e6",
                "on-error": "#ffffff",
                "on-secondary": "#ffffff",
                "on-surface": "#1a1c1d",
                "outline": "#6e7979",
                "tertiary-container": "#0e6496",
                "surface-container-highest": "#e3e2e3",

                "tertiary-fixed-dim": "#93ccff",
                "tertiary": "#004b74",
                "on-tertiary-fixed-variant": "#004b73",
                "surface-variant": "#e3e2e3",
                "on-secondary-fixed-variant": "#6c3a00",
                "primary-fixed": "#a0f0f0",
                "secondary-container": "#fda54f",

                "surface-container-lowest": "#ffffff",

                "DEFAULT": "0.25rem",

            "fontFamily": {
                "headline": ["Plus Jakarta Sans"],
                "body": ["Lexend"],
                "label": ["Lexend"]
            }
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .splash-gradient {
            background: linear-gradient(135deg, #faf9fa 0%, #f4f3f4 50%, #ffdcc1 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body m-0 p-0 overflow-hidden">
<div class="relative flex h-screen w-full flex-col splash-gradient items-center justify-center overflow-hidden">
<div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-fixed blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-fixed blur-[120px]"></div>
</div>
<div class="z-10 flex flex-col items-center px-8 text-center max-w-2xl">
<div class="mb-8 p-6 rounded-full bg-surface-container-lowest shadow-[0_32px_64px_-12px_rgba(0,0,0,0.06)]">
<div class="bg-gradient-to-br from-primary to-primary-container p-5 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[64px] text-on-primary" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
<h1 class="font-headline text-on-background tracking-tight text-[48px] md:text-[64px] font-extrabold leading-tight mb-2">
                ElderConnect
            </h1>
<p class="text-on-surface-variant text-xl md:text-2xl font-light leading-relaxed mb-12 max-w-md">
                Staying connected, staying well.
            </p>
<div class="w-full max-w-xs space-y-6">
<div class="flex flex-col gap-4">
<div class="flex items-center justify-between px-2">
<p class="text-on-surface-variant text-sm font-medium tracking-wide uppercase">Setting up your experience</p>
<p class="text-primary font-bold text-sm">30%</p>
</div>
<div class="h-3 w-full rounded-full bg-surface-container-highest overflow-hidden">
<div class="h-full rounded-full bg-gradient-to-r from-primary to-primary-container transition-all duration-1000 ease-out" style="width: 30%;"></div>
</div>
</div>
</div>
</div>
<div class="absolute bottom-12 z-10 flex flex-col items-center gap-4">
<div class="flex items-center gap-2 text-on-surface-variant/60">
<span class="material-symbols-outlined text-lg" data-icon="verified_user">verified_user</span>
<span class="text-xs font-label font-medium tracking-widest uppercase">Premium Care Standards</span>
</div>
</div>
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary-fixed to-transparent opacity-30"></div>
</div>

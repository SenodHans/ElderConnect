<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Lexend:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed": "#a0f0f0",
                    "surface-container-highest": "#e3e2e3",
                    "on-error-container": "#93000a",
                    "primary-container": "#006a6a",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#93ccff",
                    "secondary-fixed-dim": "#ffb778",
                    "tertiary-container": "#0e6496",
                    "on-tertiary-container": "#bbddff",
                    "on-surface-variant": "#3e4948",
                    "on-primary-fixed-variant": "#004f4f",
                    "on-background": "#1a1c1d",
                    "on-secondary-container": "#6f3c00",
                    "on-primary-container": "#97e7e6",
                    "secondary": "#8e4e00",
                    "on-secondary-fixed": "#2e1500",
                    "inverse-primary": "#84d4d3",
                    "surface-container-low": "#f4f3f4",
                    "surface-container": "#eeeeee",
                    "on-primary-fixed": "#002020",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-primary": "#ffffff",
                    "primary": "#005050",
                    "surface-bright": "#faf9fa",
                    "surface": "#faf9fa",
                    "surface-dim": "#dadadb",
                    "surface-tint": "#006a6a",
                    "surface-variant": "#e3e2e3",
                    "surface-container-high": "#e8e8e9",
                    "on-secondary-fixed-variant": "#6c3a00",
                    "tertiary": "#004b74",
                    "on-tertiary-fixed-variant": "#004b73",
                    "error": "#ba1a1a",
                    "inverse-on-surface": "#f1f0f1",
                    "secondary-fixed": "#ffdcc1",
                    "outline": "#6e7979",
                    "error-container": "#ffdad6",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed": "#cce5ff",
                    "on-tertiary-fixed": "#001d31",
                    "inverse-surface": "#2f3131",
                    "secondary-container": "#fda54f",
                    "background": "#faf9fa",
                    "on-surface": "#1a1c1d",
                    "primary-fixed-dim": "#84d4d3",
                    "outline-variant": "#bec9c8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Lexend"],
                    "label": ["Lexend"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .interest-tile-active {
            box-shadow: 0 0 0 3px #005050;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white/80 backdrop-blur-md text-teal-900 shadow-sm sticky top-0 z-50 flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-slate-100/50 rounded-full transition-all duration-300">
<span class="material-symbols-outlined text-2xl" data-icon="menu">menu</span>
</button>
<h1 class="font-headline text-2xl font-bold tracking-tight text-teal-800">ElderConnect</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-fixed">
<img class="w-full h-full object-cover" data-alt="close up portrait of a smiling elderly person with silver hair and warm eyes" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8zZh6Y7q1t0gkiIVniLf0Lny3dtgayYNW9LsHr1nCG-BhK1drCY0-sDAnpVIZGjEzWo3ylAT2UUj_al75Q0EGg9Eko7C_AEGs_7Jvn1uVfStbwFDZZec0cfM3mcU6quGH-C8G-6qX6W519cD82jxFsFn3s1EGxODGTKUPB4vgTaWfKNAKuVr4a6uTTQrD2NqU23WAH4tC1rCOMlFmn-2WI8qevkywCrp4SOECU2pimmLv4uSpy_e8jZEC0Kq-vGgT-gkmafFe4rQ"/>
</div>
</header>
<main class="flex-grow container mx-auto max-w-2xl px-6 pt-10 pb-32">
<!-- Hero Section -->
<div class="mb-12">
<h2 class="font-headline text-4xl font-extrabold text-primary mb-3">What do you enjoy?</h2>
<p class="text-on-surface-variant text-lg font-light leading-relaxed">Select the things you'd like to see in your feed.</p>
</div>
<!-- Interest Selection Grid -->
<div class="grid grid-cols-2 gap-6">
<!-- Health -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-xl p-6 text-left transition-all duration-300 hover:bg-surface-container active:scale-95">
<div class="bg-primary-container/10 w-14 h-14 rounded-full flex items-center justify-center mb-4 text-primary-container">
<span class="material-symbols-outlined text-3xl" data-icon="health_and_safety">health_and_safety</span>
</div>
<span class="block font-headline text-xl font-bold text-on-surface">Health</span>
</button>
<!-- Sports -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-xl p-6 text-left transition-all duration-300 hover:bg-surface-container active:scale-95">
<div class="bg-secondary-fixed/30 w-14 h-14 rounded-full flex items-center justify-center mb-4 text-secondary">
<span class="material-symbols-outlined text-3xl" data-icon="sports_tennis">sports_tennis</span>
</div>
<span class="block font-headline text-xl font-bold text-on-surface">Sports</span>
</button>
<!-- Technology -->
<button class="interest-tile-active group relative overflow-hidden bg-surface-container-lowest rounded-xl p-6 text-left transition-all duration-300 ring-4 ring-primary bg-primary/5 active:scale-95">
<div class="absolute top-4 right-4 bg-primary text-white rounded-full p-1">
<span class="material-symbols-outlined text-sm" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="bg-tertiary-fixed-dim/20 w-14 h-14 rounded-full flex items-center justify-center mb-4 text-tertiary">
<span class="material-symbols-outlined text-3xl" data-icon="devices">devices</span>
</div>
<span class="block font-headline text-xl font-bold text-primary">Technology</span>
</button>
<!-- Entertainment -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-xl p-6 text-left transition-all duration-300 hover:bg-surface-container active:scale-95">
<div class="bg-error-container/40 w-14 h-14 rounded-full flex items-center justify-center mb-4 text-on-error-container">
<span class="material-symbols-outlined text-3xl" data-icon="movie">movie</span>
</div>
<span class="block font-headline text-xl font-bold text-on-surface">Entertainment</span>
</button>
<!-- Science -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-xl p-6 text-left transition-all duration-300 hover:bg-surface-container active:scale-95">
<div class="bg-tertiary-container/10 w-14 h-14 rounded-full flex items-center justify-center mb-4 text-tertiary-container">
<span class="material-symbols-outlined text-3xl" data-icon="biotech">biotech</span>
</div>
<span class="block font-headline text-xl font-bold text-on-surface">Science</span>
</button>
<!-- Business -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-xl p-6 text-left transition-all duration-300 hover:bg-surface-container active:scale-95">
<div class="bg-secondary-container/20 w-14 h-14 rounded-full flex items-center justify-center mb-4 text-on-secondary-container">
<span class="material-symbols-outlined text-3xl" data-icon="monitoring">monitoring</span>
</div>
<span class="block font-headline text-xl font-bold text-on-surface">Business</span>
</button>
</div>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-white/80 backdrop-blur-md z-40 flex flex-col items-center gap-4 border-t border-surface-container">
<button class="w-full max-w-md bg-gradient-to-r from-primary to-primary-container text-on-primary py-5 rounded-xl font-headline text-xl font-bold shadow-lg hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-3">
            Get Started
            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-sm font-medium text-slate-500">You can change these anytime in settings.</p>
</div>
</body></html>
